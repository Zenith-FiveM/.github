name: Bug Report
description: Report a problem with Zenith
title: "[Bug]: "
labels: ["bug", "needs repro"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below so we can reproduce and fix it quickly.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version of Zenith.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Be specific.
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output
      description: Paste any relevant server/client console errors. This will be automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: Zenith version
      placeholder: "e.g. v1.0.0"
    validations:
      required: true
  - type: input
    id: artifacts
    attributes:
      label: Server artifact version
      placeholder: "e.g. 12000"
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependency versions
      description: Versions of ox_lib, oxmysql, and any other relevant dependencies.
